name: Build and Release Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "dist-app/*.dmg dist-app/*-mac.zip"
          - os: windows-latest
            artifact_glob: "dist-app/*.exe"
          - os: ubuntu-latest
            artifact_glob: "dist-app/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Decode provisioning profile
        if: matrix.os == 'macos-latest'
        run: |
          if [ -n "$MAC_PROVISIONING_PROFILE_BASE64" ]; then
            echo "$MAC_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/dayglance.provisionprofile"
            echo "MAC_PROVISIONING_PROFILE=$RUNNER_TEMP/dayglance.provisionprofile" >> $GITHUB_ENV
          fi
        env:
          MAC_PROVISIONING_PROFILE_BASE64: ${{ secrets.MAC_PROVISIONING_PROFILE_BASE64 }}

      - name: Build desktop app (macOS — signed + notarized)
        if: matrix.os == 'macos-latest'
        run: npm run build:electron -- --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_PROVISIONING_PROFILE: ${{ env.MAC_PROVISIONING_PROFILE }}

      - name: Build desktop app (Windows / Linux)
        if: matrix.os != 'macos-latest'
        run: npm run build:electron -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            dist-app/*.dmg
            dist-app/*-mac.zip
            dist-app/*.exe
            dist-app/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: false
          files: artifacts/**/*
