name: DayGlance

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    minorVersion: "5.0.0"

options:
  bundleIdPrefix: com.dayglance
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  defaultConfig: Debug
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"

targets:
  DayGlance:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DayGlance
        excludes:
          - Resources/web/**
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - target: DayGlanceWidget
        embed: true
      - target: ShareExtension
        embed: true
    entitlements:
      path: DayGlance/DayGlance.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.dayglance
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.dayglance
        com.apple.security.application-groups:
          - group.com.dayglance.app
    postBuildScripts:
      - name: Copy Web Assets
        script: |
          set -e
          SRC="${SRCROOT}/DayGlance/Resources/web"
          DST="${CODESIGNING_FOLDER_PATH}/web"
          if [ -d "$SRC" ]; then
              rm -rf "$DST"
              cp -R "$SRC" "$DST"
              echo "Copied web assets to ${DST}"
          else
              echo "warning: Web assets not found at ${SRC}. Run: npm run build:ios from the repo root."
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dayglance
        INFOPLIST_FILE: DayGlance/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "CTZ7352A3G"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: DayGlance/Info.plist
      properties:
        CFBundleDisplayName: dayGLANCE
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIStatusBarStyle: UIStatusBarStyleDefault
        UIViewControllerBasedStatusBarAppearance: false
        NSHealthShareUsageDescription: "dayGLANCE reads your step count and sleep data to show your daily activity and recovery on the home screen."
        NSHealthUpdateUsageDescription: "DayGlance uses Health data to display your steps and sleep activity on your daily timeline."
        NSCalendarsUsageDescription: "dayGLANCE reads your calendars to show upcoming events on the home screen."
        NSCalendarsFullAccessUsageDescription: "dayGLANCE reads your calendars to show upcoming events on the home screen and can create calendar events from your tasks."
        NSCalendarsWriteOnlyAccessUsageDescription: "dayGLANCE can create calendar events from your tasks."
        NSMicrophoneUsageDescription: "dayGLANCE uses the microphone to record voice input for AI task parsing."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        BGTaskSchedulerPermittedIdentifiers:
          - com.dayglance.widgetrefresh
        CFBundleURLTypes:
          - CFBundleURLName: com.dayglance
            CFBundleURLSchemes:
              - dayglance
        NSUserActivityTypes:
          - NSUserActivityTypeBrowsingWeb
          - com.apple.corespotlightitem
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: com.dayglance.newScheduledTask
            UIApplicationShortcutItemTitle: New Scheduled Task
            UIApplicationShortcutItemSubtitle: Add to today's schedule
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeAdd
          - UIApplicationShortcutItemType: com.dayglance.newInboxTask
            UIApplicationShortcutItemTitle: New Inbox Task
            UIApplicationShortcutItemSubtitle: Capture quickly
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeAdd
          - UIApplicationShortcutItemType: com.dayglance.startFocus
            UIApplicationShortcutItemTitle: Start Focus
            UIApplicationShortcutItemSubtitle: Focus on next task
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypePlay
          - UIApplicationShortcutItemType: com.dayglance.openToday
            UIApplicationShortcutItemTitle: Open Today
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeDate

  DayGlanceWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DayGlanceWidget
    entitlements:
      path: DayGlanceWidget/DayGlanceWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dayglance.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dayglance.widget
        INFOPLIST_FILE: DayGlanceWidget/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "CTZ7352A3G"
        SWIFT_VERSION: "5.9"
    info:
      path: DayGlanceWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ShareExtension
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dayglance.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dayglance.share
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "CTZ7352A3G"
        SWIFT_VERSION: "5.9"
    info:
      path: ShareExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
