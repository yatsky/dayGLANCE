server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript application/manifest+json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src *; font-src 'self' data:; worker-src 'self' blob:; manifest-src 'self';" always;

    # PWA - No cache for service worker and manifest
    # Use exact match (=) so these take priority over the regex cache block below.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Content-Type "application/manifest+json";
    }

    # Dead old service worker - no cache
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy routes — forwarded to the Node.js proxy server.
    # nginx cannot URL-decode $arg_* variables, so proxying directly to an
    # HTTPS upstream fails ("invalid URL prefix"). The Node.js server decodes
    # the url= query parameter via URLSearchParams before fetching upstream.
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # SPA fallback - send all requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
